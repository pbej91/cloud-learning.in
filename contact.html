<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact – Cloud Learning Center</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f5f7fa;
            color: #333;
        }

        /* Top Red Navigation Bar */
        .topbar {
            background: #c8102e;
            color: white;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 40px;
        }

        .topbar-left {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: bold;
            font-size: 1.1rem;
        }

        .topbar-logo {
            width: 40px;
            height: 40px;
            border-radius: 4px;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #c8102e;
            font-weight: bold;
            font-size: 1rem;
        }

        .topbar-center {
            display: flex;
            gap: 20px;
            font-size: 0.95rem;
        }

        .topbar-center a {
            color: white;
            text-decoration: none;
            font-weight: 500;
        }

        .topbar-center a:hover {
            text-decoration: underline;
        }

        .topbar-right button {
            padding: 8px 14px;
            border-radius: 20px;
            border: 1px solid white;
            background: transparent;
            color: white;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 500;
        }

        .topbar-right button.filled {
            background: white;
            color: #c8102e;
        }

        /* Hero Section */
        .hero {
            height: 240px;
            background: linear-gradient(to right, #1e3c72, #2a5298);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 2.2rem;
            font-weight: bold;
            text-align: center;
            padding: 0 20px;
        }

        /* Content Section */
        .section {
            padding: 40px 20px;
            max-width: 900px;
            margin: auto;
        }

        .box {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            margin-bottom: 30px;
        }

        input, textarea {
            width: 95%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-size: 1rem;
        }

        textarea {
            height: 120px;
            resize: none;
        }

        .submit-btn {
            background: #007bff;
            color: white;
            padding: 12px 18px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            font-size: 1rem;
        }

        .map {
            width: 100%;
            height: 260px;
            background: #ddd;
            border-radius: 10px;
            margin-top: 10px;
        }

        footer {
            background: #222;
            color: white;
            padding: 20px;
            text-align: center;
            margin-top: 40px;
        }

        /* Modal Background */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: white;
            padding: 25px;
            width: 320px;
            border-radius: 10px;
            text-align: center;
        }

        .modal-content input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        .close-btn {
            background: red;
            color: white;
            padding: 8px 15px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 10px;
        }
    </style>
</head>

<body>

    <!-- Navbar -->
    <div class="topbar">
        <div class="topbar-left">
            <div class="topbar-logo">CL</div>
            <div>Cloud Learning Center</div>
        </div>

        <div class="topbar-center">
            <a href="index.html">Home</a>
            <a href="aws.html">AWS</a>
            <a href="azure.html">Azure</a>
            <a href="azure-ai.html">Azure AI Engineer</a>
            <a href="about.html">About</a>
            <a href="contact.html">Contact</a>
        </div>

        <div class="topbar-right">
            <button onclick="openLogin()">Login</button>
            <button class="filled" onclick="openRegister()">Register</button>
        </div>
    </div>

    <!-- Hero -->
    <div class="hero">
        Contact Us
    </div>

    <!-- Contact Form -->
    <div class="section">
        <div class="box">
            <h2>Send Us a Message</h2>
            <input type="text" placeholder="Your Name">
            <input type="email" placeholder="Your Email">
            <textarea placeholder="Your Message"></textarea>
            <button class="submit-btn">Send Message</button>
        </div>

        <!-- Contact Info -->
        <div class="box">
            <h2>Contact Information</h2>
            <p><strong>Email:</strong> bejpranay@gmail.com</p>
            <p><strong>Phone:</strong> +919874451110,+919933450445 </p>
            <p><strong>Location:</strong> Kolkata, India</p>

            <div class="map">
                <!-- Map Placeholder -->
            </div>
        </div>
    </div>

    <footer>
        © 2024 Cloud Learning Center — Built by PRANAY
    </footer>

    <!-- Login Modal -->
    <div id="loginModal" class="modal">
        <div class="modal-content">
            <h3>Login</h3>
            <input type="text" placeholder="Email">
            <input type="password" placeholder="Password">
            <button class="submit-btn">Login</button>
            <button class="close-btn" onclick="closeLogin()">Close</button>
        </div>
    </div>

    <!-- Register Modal -->
    <div id="registerModal" class="modal">
        <div class="modal-content">
            <h3>Register</h3>
            <input type="text" placeholder="Full Name">
            <input type="text" placeholder="Email">
            <input type="password" placeholder="Password">
            <button class="submit-btn">Register</button>
            <button class="close-btn" onclick="closeRegister()">Close</button>
        </div>
    </div>

    <script>
        function openLogin() {
            document.getElementById("loginModal").style.display = "flex";
        }
        function closeLogin() {
            document.getElementById("loginModal").style.display = "none";
        }
        function openRegister() {
            document.getElementById("registerModal").style.display = "flex";
        }
        function closeRegister() {
            document.getElementById("registerModal").style.display = "none";
        }
    </script>

</body>
</html>
